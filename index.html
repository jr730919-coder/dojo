<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🥋 道館管理系統 Pro</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft JhengHei",sans-serif;
}

body{
  background:#111827;
  color:white;
  padding:20px;
}

h1{
  margin-bottom:20px;
  font-size:32px;
}

.card{
  background:#1f2937;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.top-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

input,
select,
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-size:16px;
}

input,
select{
  background:#374151;
  color:white;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.02);
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.stat-box{
  background:#1f2937;
  padding:20px;
  border-radius:20px;
}

.stat-title{
  color:#9ca3af;
  margin-bottom:10px;
}

.stat-value{
  font-size:30px;
  font-weight:bold;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.calendar-days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day{
  background:#374151;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.day:hover{
  background:#4b5563;
}

.selected{
  background:#2563eb;
}

.member-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.member{
  background:#1f2937;
  border-radius:20px;
  padding:20px;
  transition:0.2s;
}

.member:hover{
  transform:translateY(-3px);
}

.member h3{
  margin-bottom:10px;
  font-size:22px;
}

.plan{
  margin-bottom:10px;
  color:#d1d5db;
}

.paid{
  color:#22c55e;
  font-weight:bold;
}

.unpaid{
  color:#ef4444;
  font-weight:bold;
}

.attendance-btn{
  margin-top:15px;
  background:#16a34a;
}

.attendance-btn.off{
  background:#6b7280;
}

.delete-btn{
  margin-top:10px;
  background:#dc2626;
}

.backup-btn{
  background:#7c3aed;
}

.search-box{
  margin-bottom:20px;
}

@media(max-width:768px){

  h1{
    font-size:24px;
  }

  .calendar-days{
    gap:5px;
  }

  .day{
    padding:10px 0;
    font-size:14px;
  }
}

</style>
</head>

<body>

<h1>🥋 道館管理系統 Pro</h1>

<div class="stats">

  <div class="stat-box">
    <div class="stat-title">學生總數</div>
    <div class="stat-value" id="totalStudents">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">本月收入</div>
    <div class="stat-value" id="monthlyIncome">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">本日出席</div>
    <div class="stat-value" id="todayAttendance">0</div>
  </div>

</div>

<div class="card">

  <div class="top-grid">

    <input type="text" id="name" placeholder="學生姓名">

    <select id="plan">
      <option value="2000">2000</option>
      <option value="2500">2500</option>
      <option value="3000">3000</option>
      <option value="3500">3500</option>
      <option value="4000">4000</option>
    </select>

    <select id="paid">
      <option value="已繳費">已繳費</option>
      <option value="未繳費">未繳費</option>
    </select>

    <button onclick="addMember()">新增學生</button>

    <button class="backup-btn" onclick="backupData()">
      備份資料
    </button>

  </div>

</div>

<div class="card search-box">

  <input
    type="text"
    id="searchInput"
    placeholder="搜尋學生..."
    oninput="renderMembers()"
  >

</div>

<div class="card">

  <div class="calendar-header">

    <button onclick="prevMonth()">⬅</button>

    <h2 id="monthYear"></h2>

    <button onclick="nextMonth()">➡</button>

  </div>

  <div class="calendar-days" id="calendarDays"></div>

</div>

<div class="member-list" id="memberList"></div>

<script>

let members =
JSON.parse(localStorage.getItem("dojo_members")) || [];

let attendance =
JSON.parse(localStorage.getItem("dojo_attendance")) || {};

let currentDate = new Date();

let selectedDate = formatDate(new Date());

function saveData(){

  localStorage.setItem(
    "dojo_members",
    JSON.stringify(members)
  );

  localStorage.setItem(
    "dojo_attendance",
    JSON.stringify(attendance)
  );
}

function formatDate(date){

  return date.toISOString().split("T")[0];
}

function addMember(){

  const name =
    document.getElementById("name").value.trim();

  const plan =
    document.getElementById("plan").value;

  const paid =
    document.getElementById("paid").value;

  if(name === ""){

    alert("請輸入學生姓名");
    return;
  }

  members.push({
    id:Date.now(),
    name:name,
    plan:plan,
    paid:paid
  });

  saveData();

  document.getElementById("name").value="";

  renderMembers();
  updateStats();
}

function deleteMember(id){

  if(confirm("確定刪除？")){

    members =
      members.filter(m => m.id !== id);

    for(let date in attendance){

      attendance[date] =
        attendance[date]
        .filter(mid => mid !== id);
    }

    saveData();

    renderMembers();
    updateStats();
  }
}

function updatePaid(id,value){

  const member =
    members.find(m => m.id === id);

  if(member){

    member.paid = value;
  }

  saveData();

  renderMembers();
  updateStats();
}

function toggleAttendance(id){

  if(!attendance[selectedDate]){

    attendance[selectedDate] = [];
  }

  const exists =
    attendance[selectedDate].includes(id);

  if(exists){

    attendance[selectedDate] =
      attendance[selectedDate]
      .filter(mid => mid !== id);

  }else{

    attendance[selectedDate].push(id);
  }

  saveData();

  renderMembers();
  updateStats();
}

function countMonthlyAttendance(id){

  const month =
    selectedDate.slice(0,7);

  let count = 0;

  for(let date in attendance){

    if(date.startsWith(month)){

      if(attendance[date].includes(id)){

        count++;
      }
    }
  }

  return count;
}

function renderMembers(){

  const list =
    document.getElementById("memberList");

  const search =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

  list.innerHTML = "";

  const sortedMembers =
    [...members]
    .sort((a,b)=>a.name.localeCompare(b.name));

  sortedMembers.forEach(member=>{

    if(
      !member.name
      .toLowerCase()
      .includes(search)
    ){
      return;
    }

    const attended =
      attendance[selectedDate] &&
      attendance[selectedDate]
      .includes(member.id);

    const total =
      countMonthlyAttendance(member.id);

    const paidClass =
      member.paid === "已繳費"
      ? "paid"
      : "unpaid";

    const div =
      document.createElement("div");

    div.className = "member";

    div.innerHTML = `

      <h3>${member.name}</h3>

      <div class="plan">
        方案：${member.plan}
      </div>

      <div class="${paidClass}">
        ${member.paid}
      </div>

      <br>

      <select onchange="updatePaid(${member.id},this.value)">

        <option value="已繳費"
          ${member.paid==="已繳費" ? "selected" : ""}
        >
          已繳費
        </option>

        <option value="未繳費"
          ${member.paid==="未繳費" ? "selected" : ""}
        >
          未繳費
        </option>

      </select>

      <p style="margin-top:12px;">
        本月上課：${total} 堂
      </p>

      <button
        class="attendance-btn ${attended ? "" : "off"}"
        onclick="toggleAttendance(${member.id})"
      >
        ${attended ? "✅ 已出席" : "➕ 記錄出席"}
      </button>

      <button
        class="delete-btn"
        onclick="deleteMember(${member.id})"
      >
        刪除
      </button>

    `;

    list.appendChild(div);

  });

}

function renderCalendar(){

  const container =
    document.getElementById("calendarDays");

  container.innerHTML = "";

  const year =
    currentDate.getFullYear();

  const month =
    currentDate.getMonth();

  document.getElementById("monthYear")
  .innerText =
    `${year} 年 ${month+1} 月`;

  const firstDay =
    new Date(year,month,1).getDay();

  const daysInMonth =
    new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){

    const empty =
      document.createElement("div");

    container.appendChild(empty);
  }

  for(let day=1;day<=daysInMonth;day++){

    const div =
      document.createElement("div");

    div.className = "day";

    const date =
      `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

    if(date === selectedDate){

      div.classList.add("selected");
    }

    div.innerText = day;

    div.onclick = ()=>{

      selectedDate = date;

      renderCalendar();
      renderMembers();
      updateStats();
    };

    container.appendChild(div);
  }
}

function prevMonth(){

  currentDate.setMonth(
    currentDate.getMonth()-1
  );

  renderCalendar();
}

function nextMonth(){

  currentDate.setMonth(
    currentDate.getMonth()+1
  );

  renderCalendar();
}

function updateStats(){

  document.getElementById(
    "totalStudents"
  ).innerText =
    members.length;

  let income = 0;

  members.forEach(member=>{

    if(member.paid==="已繳費"){

      income += Number(member.plan);
    }
  });

  document.getElementById(
    "monthlyIncome"
  ).innerText =
    "$" + income;

  const todayList =
    attendance[selectedDate] || [];

  document.getElementById(
    "todayAttendance"
  ).innerText =
    todayList.length;
}

function backupData(){

  const data = {
    members,
    attendance
  };

  const blob =
    new Blob(
      [JSON.stringify(data,null,2)],
      {type:"application/json"}
    );

  const a =
    document.createElement("a");

  a.href =
    URL.createObjectURL(blob);

  a.download =
    "dojo_backup.json";

  a.click();
}

renderCalendar();

renderMembers();

updateStats();

</script>

</body>
</html>
