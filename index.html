<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>道館出席管理系統</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
  background:#0f1115;
  color:#fff;
  padding:20px;
}

h1{
  margin-bottom:20px;
  font-size:32px;
}

.top-box{
  background:#1b1f27;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

input,
select,
button{
  border:none;
  border-radius:12px;
  padding:12px;
  font-size:15px;
}

input,
select{
  background:#2b3140;
  color:white;
}

button{
  cursor:pointer;
  background:#4f8cff;
  color:white;
  font-weight:bold;
}

button:hover{
  opacity:0.9;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.stat-card{
  background:#1b1f27;
  border-radius:20px;
  padding:20px;
}

.stat-title{
  color:#aaa;
  margin-bottom:10px;
}

.stat-value{
  font-size:30px;
  font-weight:bold;
}

.calendar{
  background:#1b1f27;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day{
  background:#2b3140;
  padding:15px 0;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
}

.day:hover{
  background:#3b4356;
}

.selected{
  background:#4f8cff;
}

.member-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.member{
  background:#1b1f27;
  border-radius:20px;
  padding:18px;
}

.member h3{
  margin-bottom:12px;
}

.plan{
  margin-bottom:10px;
  color:#7db4ff;
}

.paid{
  color:#22c55e;
  font-weight:bold;
}

.unpaid{
  color:#ff5d73;
  font-weight:bold;
}

.attendance-btn{
  width:100%;
  margin-top:12px;
  background:#22c55e;
}

.attendance-btn.off{
  background:#444;
}

.delete-btn{
  width:100%;
  margin-top:10px;
  background:#ff5d73;
}

.detail-btn{
  width:100%;
  margin-top:10px;
  background:#7c5cff;
}

.history{
  margin-top:12px;
  background:#2b3140;
  border-radius:12px;
  padding:12px;
  display:none;
  font-size:14px;
  line-height:1.8;
}

.search-box{
  margin-bottom:20px;
}

.search-box input{
  width:100%;
  padding:14px;
}

@media(max-width:700px){

  .member-list{
    grid-template-columns:1fr 1fr;
  }

  .days{
    gap:6px;
  }

  .day{
    padding:10px 0;
    font-size:14px;
  }

}

</style>
</head>

<body>

<h1>🥋 道館出席管理系統</h1>

<div class="top-box">

  <input type="text" id="name" placeholder="學生姓名">

  <select id="plan">
    <option value="2000">2000</option>
    <option value="2500">2500</option>
    <option value="3000">3000</option>
    <option value="3500">3500</option>
    <option value="4000">4000</option>
  </select>

  <select id="paid">
    <option value="已繳費">已繳費</option>
    <option value="未繳費">未繳費</option>
  </select>

  <button onclick="addMember()">新增學生</button>

  <button onclick="backupData()">一鍵備份</button>

</div>

<div class="stats">

  <div class="stat-card">
    <div class="stat-title">學生總數</div>
    <div class="stat-value" id="totalMembers">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-title">本月收入</div>
    <div class="stat-value" id="monthlyIncome">0</div>
  </div>

  <div class="stat-card">
    <div class="stat-title">今日出席</div>
    <div class="stat-value" id="todayAttendance">0</div>
  </div>

</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="搜尋學生..." oninput="renderMembers()">
</div>

<div class="calendar">

  <div class="calendar-header">

    <button onclick="prevMonth()">⬅</button>

    <h2 id="monthYear"></h2>

    <button onclick="nextMonth()">➡</button>

  </div>

  <div class="days" id="calendarDays"></div>

</div>

<div class="member-list" id="memberList"></div>

<script>

let members =
JSON.parse(localStorage.getItem("dojo_members")) || [];

let attendance =
JSON.parse(localStorage.getItem("dojo_attendance")) || {};

let currentDate = new Date();

let selectedDate = formatDate(new Date());

function saveData(){

  localStorage.setItem(
    "dojo_members",
    JSON.stringify(members)
  );

  localStorage.setItem(
    "dojo_attendance",
    JSON.stringify(attendance)
  );
}

function formatDate(date){

  return date.toISOString().split("T")[0];
}

function addMember(){

  const name =
    document.getElementById("name").value.trim();

  const plan =
    document.getElementById("plan").value;

  const paid =
    document.getElementById("paid").value;

  if(!name){

    alert("請輸入學生姓名");
    return;
  }

  members.push({
    id:Date.now(),
    name,
    plan,
    paid
  });

  members.sort((a,b)=>a.name.localeCompare(b.name));

  saveData();

  document.getElementById("name").value="";

  renderMembers();
  updateStats();
}

function deleteMember(id){

  if(confirm("確定刪除？")){

    members =
      members.filter(m=>m.id!==id);

    for(let date in attendance){

      attendance[date] =
        attendance[date].filter(mid=>mid!==id);
    }

    saveData();

    renderMembers();
    updateStats();
  }
}

function updatePaid(id, value){

  const member =
    members.find(m=>m.id===id);

  if(member){

    member.paid = value;
  }

  saveData();

  renderMembers();
  updateStats();
}

function toggleAttendance(id){

  if(!attendance[selectedDate]){

    attendance[selectedDate]=[];
  }

  const exists =
    attendance[selectedDate].includes(id);

  if(exists){

    attendance[selectedDate] =
      attendance[selectedDate]
      .filter(mid=>mid!==id);

  }else{

    attendance[selectedDate].push(id);
  }

  saveData();

  renderMembers();
  updateStats();
}

function countMonthlyAttendance(id){

  const currentMonth =
    selectedDate.slice(0,7);

  let count = 0;

  for(let date in attendance){

    if(date.startsWith(currentMonth)){

      if(attendance[date].includes(id)){

        count++;
      }
    }
  }

  return count;
}

function getAttendanceDates(id){

  const currentMonth =
    selectedDate.slice(0,7);

  let dates = [];

  for(let date in attendance){

    if(date.startsWith(currentMonth)){

      if(attendance[date].includes(id)){

        dates.push(date.split("-")[2]+"日");
      }
    }
  }

  return dates;
}

function toggleHistory(id){

  const box =
    document.getElementById("history-"+id);

  if(box.style.display==="block"){

    box.style.display="none";

  }else{

    box.style.display="block";
  }
}

function renderMembers(){

  const list =
    document.getElementById("memberList");

  const keyword =
    document.getElementById("searchInput")
    .value
    .trim();

  list.innerHTML="";

  members
  .filter(m=>m.name.includes(keyword))
  .forEach(member=>{

    const attended =
      attendance[selectedDate] &&
      attendance[selectedDate]
      .includes(member.id);

    const total =
      countMonthlyAttendance(member.id);

    const dates =
      getAttendanceDates(member.id);

    const div =
      document.createElement("div");

    div.className="member";

    div.innerHTML=`

      <h3>${member.name}</h3>

      <div class="plan">
        月費：${member.plan}
      </div>

      <div class="${
        member.paid==="已繳費"
        ? "paid"
        : "unpaid"
      }">
        ${member.paid}
      </div>

      <br>

      <select onchange="updatePaid(${member.id}, this.value)">

        <option value="已繳費"
          ${member.paid==="已繳費" ? "selected" : ""}>
          已繳費
        </option>

        <option value="未繳費"
          ${member.paid==="未繳費" ? "selected" : ""}>
          未繳費
        </option>

      </select>

      <p style="margin-top:12px;">
        本月上課：${total} 堂
      </p>

      <button
        class="attendance-btn ${attended ? "" : "off"}"
        onclick="toggleAttendance(${member.id})"
      >
        ${attended ? "✅ 今日已出席" : "➕ 點名"}
      </button>

      <button
        class="detail-btn"
        onclick="toggleHistory(${member.id})"
      >
        📅 查看本月紀錄
      </button>

      <div
        class="history"
        id="history-${member.id}"
      >
        ${
          dates.length
          ? dates.join("、")
          : "本月尚無出席紀錄"
        }
      </div>

      <button
        class="delete-btn"
        onclick="deleteMember(${member.id})"
      >
        刪除學生
      </button>

    `;

    list.appendChild(div);
  });
}

function renderCalendar(){

  const daysContainer =
    document.getElementById("calendarDays");

  daysContainer.innerHTML="";

  const year =
    currentDate.getFullYear();

  const month =
    currentDate.getMonth();

  document.getElementById("monthYear")
  .innerText =
    `${year} 年 ${month+1} 月`;

  const firstDay =
    new Date(year,month,1).getDay();

  const daysInMonth =
    new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){

    const empty =
      document.createElement("div");

    daysContainer.appendChild(empty);
  }

  for(let day=1;day<=daysInMonth;day++){

    const div =
      document.createElement("div");

    div.className="day";

    const date =
      `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

    if(date===selectedDate){

      div.classList.add("selected");
    }

    div.innerText=day;

    div.onclick=()=>{

      selectedDate=date;

      renderCalendar();

      renderMembers();

      updateStats();
    };

    daysContainer.appendChild(div);
  }
}

function prevMonth(){

  currentDate.setMonth(
    currentDate.getMonth()-1
  );

  renderCalendar();
}

function nextMonth(){

  currentDate.setMonth(
    currentDate.getMonth()+1
  );

  renderCalendar();
}

function updateStats(){

  document.getElementById(
    "totalMembers"
  ).innerText =
    members.length;

  const paidMembers =
    members.filter(
      m=>m.paid==="已繳費"
    );

  let income = 0;

  paidMembers.forEach(m=>{

    income += Number(m.plan);
  });

  document.getElementById(
    "monthlyIncome"
  ).innerText =
    "$"+income;

  const today =
    attendance[selectedDate] || [];

  document.getElementById(
    "todayAttendance"
  ).innerText =
    today.length;
}

function backupData(){

  const data = {
    members,
    attendance
  };

  const blob = new Blob(
    [JSON.stringify(data)],
    {type:"application/json"}
  );

  const a =
    document.createElement("a");

  a.href =
    URL.createObjectURL(blob);

  a.download =
    "dojo_backup.json";

  a.click();
}

renderCalendar();
renderMembers();
updateStats();

</script>

</body>
</html>
