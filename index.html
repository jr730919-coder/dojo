<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>道館出席管理系統</title>

  <style>
    *{
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      margin:0;
      background:#f5f5f5;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    .top-box{
      background:white;
      padding:15px;
      border-radius:15px;
      margin-bottom:20px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    input,select,button{
      padding:10px;
      margin:5px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
    }

    button{
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .calendar{
      background:white;
      padding:15px;
      border-radius:15px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      margin-bottom:20px;
    }

    .calendar-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .days{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:5px;
    }

    .day{
      background:#eee;
      padding:15px;
      text-align:center;
      border-radius:10px;
      cursor:pointer;
    }

    .day:hover{
      background:#d9d9d9;
    }

    .selected{
      background:#222;
      color:white;
    }

    .member-list{
      display:grid;
      gap:15px;
    }

    .member{
      background:white;
      padding:15px;
      border-radius:15px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .member-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
    }

    .attendance-btn{
      margin-top:10px;
      width:100%;
      background:#0b7d32;
    }

    .attendance-btn.off{
      background:#999;
    }

    .delete-btn{
      background:red;
    }

    .paid{
      color:green;
      font-weight:bold;
    }

    .unpaid{
      color:red;
      font-weight:bold;
    }

    @media(max-width:600px){
      .days{
        grid-template-columns:repeat(7,1fr);
      }

      .day{
        padding:10px 0;
        font-size:14px;
      }
    }
  </style>
</head>

<body>

<h1>🥋 道館出席管理系統</h1>

<div class="top-box">
  <h3>新增學生</h3>

  <input type="text" id="name" placeholder="學生姓名">

  <select id="plan">
    <option value="2000">2000</option>
    <option value="2500">2500</option>
    <option value="3000">3000</option>
    <option value="3500">3500</option>
    <option value="4000">4000</option>
  </select>

  <select id="paid">
    <option value="已繳費">已繳費</option>
    <option value="未繳費">未繳費</option>
  </select>

  <button onclick="addMember()">新增學生</button>
</div>

<div class="calendar">
  <div class="calendar-header">
    <button onclick="prevMonth()">⬅</button>
    <h2 id="monthYear"></h2>
    <button onclick="nextMonth()">➡</button>
  </div>

  <div class="days" id="calendarDays"></div>
</div>

<h2>📋 學生列表</h2>

<div class="member-list" id="memberList"></div>

<script>

let members = JSON.parse(localStorage.getItem("dojo_members")) || [];

let attendance = JSON.parse(localStorage.getItem("dojo_attendance")) || {};

let currentDate = new Date();

let selectedDate = formatDate(new Date());

function saveData(){
  localStorage.setItem("dojo_members", JSON.stringify(members));
  localStorage.setItem("dojo_attendance", JSON.stringify(attendance));
}

function formatDate(date){
  return date.toISOString().split("T")[0];
}

function addMember(){

  const name = document.getElementById("name").value.trim();
  const plan = document.getElementById("plan").value;
  const paid = document.getElementById("paid").value;

  if(!name){
    alert("請輸入學生姓名");
    return;
  }

  members.push({
    id:Date.now(),
    name,
    plan,
    paid
  });

  saveData();

  document.getElementById("name").value="";

  renderMembers();
}

function deleteMember(id){

  if(confirm("確定刪除？")){

    members = members.filter(m=>m.id!==id);

    for(let date in attendance){
      attendance[date] = attendance[date].filter(mid=>mid!==id);
    }

    saveData();
    renderMembers();
  }
}

function toggleAttendance(id){

  if(!attendance[selectedDate]){
    attendance[selectedDate]=[];
  }

  const exists = attendance[selectedDate].includes(id);

  if(exists){
    attendance[selectedDate] =
      attendance[selectedDate].filter(mid=>mid!==id);
  }else{
    attendance[selectedDate].push(id);
  }

  saveData();
  renderMembers();
}

function countMonthlyAttendance(id){

  const now = selectedDate.slice(0,7);

  let count = 0;

  for(let date in attendance){

    if(date.startsWith(now)){

      if(attendance[date].includes(id)){
        count++;
      }
    }
  }

  return count;
}

function renderMembers(){

  const list = document.getElementById("memberList");

  list.innerHTML="";

  members.forEach(member=>{

    const attended =
      attendance[selectedDate] &&
      attendance[selectedDate].includes(member.id);

    const total = countMonthlyAttendance(member.id);

    const div = document.createElement("div");

    div.className="member";

    div.innerHTML=`
      <div class="member-top">

        <div>
          <h3>${member.name}</h3>

          <p>方案：${member.plan}</p>

          <p class="${member.paid==="已繳費" ? "paid":"unpaid"}">
            ${member.paid}
          </p>

          <p>本月上課：${total} 堂</p>
        </div>

        <div>
          <button class="delete-btn"
            onclick="deleteMember(${member.id})">
            刪除
          </button>
        </div>

      </div>

      <button
        class="attendance-btn ${attended ? "" : "off"}"
        onclick="toggleAttendance(${member.id})"
      >
        ${attended ? "✅ 已出席" : "➕ 點我記錄出席"}
      </button>
    `;

    list.appendChild(div);
  });
}

function renderCalendar(){

  const daysContainer =
    document.getElementById("calendarDays");

  daysContainer.innerHTML="";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthYear").innerText =
    `${year} 年 ${month+1} 月`;

  const firstDay = new Date(year,month,1).getDay();

  const daysInMonth =
    new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){

    const empty = document.createElement("div");
    daysContainer.appendChild(empty);
  }

  for(let day=1; day<=daysInMonth; day++){

    const div = document.createElement("div");

    div.className="day";

    const date =
      `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

    if(date===selectedDate){
      div.classList.add("selected");
    }

    div.innerText=day;

    div.onclick=()=>{

      selectedDate=date;

      renderCalendar();
      renderMembers();
    };

    daysContainer.appendChild(div);
  }
}

function prevMonth(){

  currentDate.setMonth(currentDate.getMonth()-1);

  renderCalendar();
}

function nextMonth(){

  currentDate.setMonth(currentDate.getMonth()+1);

  renderCalendar();
}

renderCalendar();
renderMembers();

</script>

</body>
</html>
